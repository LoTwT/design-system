name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      npm_tag: ${{ steps.release.outputs.npm_tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      make_latest: ${{ steps.release.outputs.make_latest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: setup-chrome
        with:
          chrome-version: 150.0.7871.125

      - name: Derive release version and channel
        id: release
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$ ]]; then
            echo "Tag must be vX.Y.Z or vX.Y.Z-prerelease, got $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            NPM_TAG="next"
            PRERELEASE="true"
            MAKE_LATEST="false"
          else
            NPM_TAG="latest"
            PRERELEASE="false"
            MAKE_LATEST="true"
          fi

          {
            echo "version=$VERSION"
            echo "npm_tag=$NPM_TAG"
            echo "prerelease=$PRERELEASE"
            echo "make_latest=$MAKE_LATEST"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          THEME_VERSION="$(node -p "require('./packages/theme/package.json').version")"
          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"

          test "$ROOT_VERSION" = "$VERSION" || { echo "root package.json version $ROOT_VERSION != $VERSION" >&2; exit 1; }
          test "$THEME_VERSION" = "$VERSION" || { echo "packages/theme package.json version $THEME_VERSION != $VERSION" >&2; exit 1; }
          test "$COMMIT_SUBJECT" = "chore: release v$VERSION" || { echo "unexpected release commit: $COMMIT_SUBJECT" >&2; exit 1; }
          git fetch origin main:refs/remotes/origin/main --tags
          git merge-base --is-ancestor HEAD origin/main || { echo "release tag commit is not contained in origin/main" >&2; exit 1; }

      - name: Validate npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          NPM_VERSION="$(npm --version)"
          node - "$NPM_VERSION" <<'NODE'
          const version = process.argv[2]
          const [major = 0, minor = 0, patch = 0] = version.split('.').map(Number)
          const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)))
          if (!ok) {
            console.error(`npm ${version} does not satisfy >= 11.5.1`)
            process.exit(1)
          }
          console.log(`npm ${version} satisfies >= 11.5.1`)
          NODE

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm site:typecheck
      - run: pnpm site:build
      - run: pnpm site:browser
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          EXPECTED_CHROME_VERSION: 150.0.7871.125

      - name: Build immutable release artifact
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="$RUNNER_TEMP/release-artifact"
          mkdir -p "$ARTIFACT_DIR"
          pnpm --filter @ayingott/theme pack --pack-destination "$ARTIFACT_DIR"

          mapfile -t TARBALLS < <(find "$ARTIFACT_DIR" -maxdepth 1 -type f -name '*.tgz' -print)
          test "${#TARBALLS[@]}" -eq 1 || { echo "expected exactly one release tarball, found ${#TARBALLS[@]}" >&2; exit 1; }
          TARBALL="${TARBALLS[0]}"

          PACKAGE_JSON="$ARTIFACT_DIR/package.json"
          tar -xOf "$TARBALL" package/package.json > "$PACKAGE_JSON"
          node - "$PACKAGE_JSON" "$VERSION" <<'NODE'
          const fs = require('node:fs')
          const [packageJsonPath, expectedVersion] = process.argv.slice(2)
          const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))
          if (pkg.name !== '@ayingott/theme' || pkg.version !== expectedVersion) {
            console.error(`unexpected tarball metadata: ${pkg.name}@${pkg.version}`)
            process.exit(1)
          }
          NODE
          rm "$PACKAGE_JSON"

          pnpm exec git-cliff --latest --strip header --output "$ARTIFACT_DIR/release-notes.md"
          (cd "$ARTIFACT_DIR" && sha256sum ./*.tgz ./release-notes.md > SHA256SUMS)

      - name: Upload validated release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: validated-release-artifact
          path: ${{ runner.temp }}/release-artifact
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish @ayingott/theme
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      actions: read
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download validated release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: validated-release-artifact
          path: release-artifact

      - name: Verify artifact integrity
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifact
          sha256sum --check SHA256SUMS

      - name: Validate npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          NPM_VERSION="$(npm --version)"
          node - "$NPM_VERSION" <<'NODE'
          const version = process.argv[2]
          const [major = 0, minor = 0, patch = 0] = version.split('.').map(Number)
          const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)))
          if (!ok) {
            console.error(`npm ${version} does not satisfy >= 11.5.1`)
            process.exit(1)
          }
          console.log(`npm ${version} satisfies >= 11.5.1`)
          NODE

      - name: Check npm version absence
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "@ayingott/theme@$VERSION" version >/dev/null 2>&1; then
            echo "@ayingott/theme@$VERSION already exists on npm" >&2
            exit 1
          fi

      - name: Publish validated tarball with trusted publishing
        shell: bash
        env:
          NPM_TAG: ${{ needs.validate.outputs.npm_tag }}
        run: |
          set -euo pipefail
          mapfile -t TARBALLS < <(find release-artifact -maxdepth 1 -type f -name '*.tgz' -print)
          test "${#TARBALLS[@]}" -eq 1 || { echo "expected exactly one release tarball, found ${#TARBALLS[@]}" >&2; exit 1; }
          npm publish "${TARBALLS[0]}" --access public --tag "$NPM_TAG" --ignore-scripts

  github-release:
    name: Create GitHub Release
    needs:
      - validate
      - publish
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download validated release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: validated-release-artifact
          path: release-artifact

      - name: Verify artifact integrity
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifact
          sha256sum --check SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: design-system v${{ needs.validate.outputs.version }}
          body_path: release-artifact/release-notes.md
          prerelease: ${{ needs.validate.outputs.prerelease }}
          make_latest: ${{ needs.validate.outputs.make_latest }}

  registry-smoke:
    name: Registry install smoke
    needs:
      - validate
      - publish
      - github-release
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Registry install smoke for @ayingott/theme
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          npm init -y >/dev/null

          # npm CDN propagation usually completes in 10-60s after publish, but
          # can tail into several minutes. The smoke is intentionally
          # post-release: publish success is enough to create the GitHub
          # Release, while a failed smoke keeps this workflow red so QA can
          # distinguish propagation lag from a real install/runtime failure.
          MAX_ATTEMPTS=20
          DELAY=60
          ATTEMPT=1

          while true; do
            if THEME_VERSION="$(npm view "@ayingott/theme@$VERSION" version 2>/dev/null)"; then
              echo "npm registry has @ayingott/theme@$THEME_VERSION"
              if npm install "@ayingott/theme@$VERSION" tailwindcss@4.2.4 @tailwindcss/cli@4.2.4 >/dev/null 2>&1; then
                echo "npm install succeeded on attempt $ATTEMPT"
                break
              fi
              echo "npm install attempt $ATTEMPT failed after the package version was visible; retrying in case tarball propagation is lagging..."
              rm -rf node_modules package-lock.json
            else
              echo "npm registry propagation attempt $ATTEMPT missing: @ayingott/theme"
            fi

            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              {
                echo "### Registry install smoke failed"
                echo ""
                echo "- Version: ${VERSION}"
                echo "- Attempts: ${MAX_ATTEMPTS}"
                echo "- Delay: ${DELAY}s"
                echo ""
                echo "The publish step succeeded and the GitHub Release was already created. Treat this as a post-publish consumer smoke failure: verify npm package visibility, provenance, and a fresh install before declaring release-ready."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "registry install smoke timed out after $MAX_ATTEMPTS attempts (~$((MAX_ATTEMPTS * DELAY))s). Publish succeeded and GitHub Release creation already ran; verify with npm view/provenance/fresh install before declaring release-ready." >&2
              echo "Final npm view diagnostics:" >&2
              npm view "@ayingott/theme@$VERSION" version || true
              echo "Final npm install diagnostics:" >&2
              npm install "@ayingott/theme@$VERSION" tailwindcss@4.2.4 @tailwindcss/cli@4.2.4
              exit 1
            fi
            echo "waiting ${DELAY}s before retry..."
            sleep "$DELAY"
            ATTEMPT=$((ATTEMPT + 1))
          done

          cat > input.css <<'CSS'
          @import "tailwindcss";
          @import "@ayingott/theme/fonts.css";
          @import "@ayingott/theme";
          @source inline("bg-lavender-500 text-neutral-950 font-display font-reading font-mono rounded-card shadow-card focus-ring touch-target");
          CSS
          npx tailwindcss -i input.css -o output.css
          grep -q -- '--surface-canvas' output.css
          grep -q -- '--reading-link' output.css
          grep -q -- '--reading-measure' output.css
          grep -q -- '.bg-lavender-500' output.css
          grep -q -- '.font-reading' output.css
          grep -q -- '@font-face' output.css
          grep -q -- 'newsreader-latin-opsz-normal.woff2' output.css
          grep -q -- 'newsreader-latin-ext-opsz-normal.woff2' output.css
          grep -q -- 'space-grotesk-latin-wght-normal.woff2' output.css
          grep -q -- '.focus-ring' output.css
          grep -q -- '.touch-target' output.css
