name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish @ayingott/theme
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Derive release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$ ]]; then
            echo "Tag must be vX.Y.Z or vX.Y.Z-prerelease, got $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          THEME_VERSION="$(node -p "require('./packages/theme/package.json').version")"
          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"

          test "$ROOT_VERSION" = "$VERSION" || { echo "root package.json version $ROOT_VERSION != $VERSION" >&2; exit 1; }
          test "$THEME_VERSION" = "$VERSION" || { echo "packages/theme package.json version $THEME_VERSION != $VERSION" >&2; exit 1; }
          test "$COMMIT_SUBJECT" = "chore: release v$VERSION" || { echo "unexpected release commit: $COMMIT_SUBJECT" >&2; exit 1; }
          git fetch origin main:refs/remotes/origin/main --tags
          git merge-base --is-ancestor HEAD origin/main || { echo "release tag commit is not contained in origin/main" >&2; exit 1; }

      - name: Validate npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          NPM_VERSION="$(npm --version)"
          node - "$NPM_VERSION" <<'NODE'
          const version = process.argv[2]
          const [major = 0, minor = 0, patch = 0] = version.split('.').map(Number)
          const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)))
          if (!ok) {
            console.error(`npm ${version} does not satisfy >= 11.5.1`)
            process.exit(1)
          }
          console.log(`npm ${version} satisfies >= 11.5.1`)
          NODE

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm site:build
      - run: pnpm --filter @ayingott/theme pack:dry

      - name: Check npm version absence
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "@ayingott/theme@$VERSION" version >/dev/null 2>&1; then
            echo "@ayingott/theme@$VERSION already exists on npm" >&2
            exit 1
          fi

      - name: Publish @ayingott/theme to npm with trusted publishing
        working-directory: packages/theme
        run: pnpm publish --access public --no-git-checks

      - name: Registry install smoke for @ayingott/theme
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          npm init -y >/dev/null

          # Retry npm install with backoff to absorb npm registry CDN
          # propagation lag immediately after publish. Total budget is
          # MAX_ATTEMPTS * DELAY ≈ 60s, well under the typical worst-case
          # propagation window observed for newly-published versions.
          MAX_ATTEMPTS=6
          DELAY=10
          ATTEMPT=1
          until npm install "@ayingott/theme@$VERSION" tailwindcss@4.2.4 @tailwindcss/cli@4.2.4 >/dev/null 2>&1; do
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "npm install failed after $MAX_ATTEMPTS attempts (npm CDN propagation timeout?)" >&2
              # Final attempt without redirect so the real error surfaces in logs.
              npm install "@ayingott/theme@$VERSION" tailwindcss@4.2.4 @tailwindcss/cli@4.2.4
              exit 1
            fi
            echo "npm install attempt $ATTEMPT failed (likely npm CDN propagation lag); waiting ${DELAY}s before retry..."
            sleep "$DELAY"
            ATTEMPT=$((ATTEMPT + 1))
          done
          echo "npm install succeeded on attempt $ATTEMPT"

          cat > input.css <<'CSS'
          @import "tailwindcss";
          @import "@ayingott/theme/fonts.css";
          @import "@ayingott/theme";
          @source inline("bg-lavender-500 text-neutral-950 font-display font-mono rounded-card shadow-card focus-ring touch-target");
          CSS
          npx tailwindcss -i input.css -o output.css
          grep -q -- '--surface-canvas' output.css
          grep -q -- '.bg-lavender-500' output.css
          grep -q -- '@font-face' output.css
          grep -q -- 'space-grotesk-latin-wght-normal.woff2' output.css
          grep -q -- '.focus-ring' output.css
          grep -q -- '.touch-target' output.css

      - name: Generate release notes
        run: npx --yes git-cliff@2.13.1 --latest --strip header --output /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          name: design-system v${{ steps.release.outputs.version }}
          body_path: /tmp/release-notes.md
          make_latest: true
