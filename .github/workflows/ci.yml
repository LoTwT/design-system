name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  site:
    name: site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: setup-chrome
        with:
          chrome-version: 150.0.7871.125
      - run: pnpm install --frozen-lockfile
      - run: pnpm site:typecheck
      - run: pnpm site:build
      - run: pnpm site:browser
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          EXPECTED_CHROME_VERSION: 150.0.7871.125
